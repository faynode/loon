#!name=Return-CN (Malaysia)
#!desc=Loon 马来西亚回国分流配置（优化版）
#!author=GPT-5.2-Codex
#!homepage=https://github.com

[General]
allow-wifi-access = true
bypass-system = true
ipv6 = false
dns-server = system,223.5.5.5,223.6.6.6,119.29.29.29
skip-proxy = 127.0.0.1,localhost,*.local,*.lan

[Proxy]
# 请替换为你自己的回国节点
CN-Shanghai = ss, your.server.com, 443, encrypt-method=aes-128-gcm, password=your_password, obfs=tls, obfs-host=cdn.qq.com
CN-Guangzhou = ss, your.server.com, 443, encrypt-method=aes-128-gcm, password=your_password, obfs=tls, obfs-host=www.bilibili.com

[Proxy Group]
自动回国 = url-test, CN-Shanghai, CN-Guangzhou, url=http://www.gstatic.com/generate_204, interval=600, tolerance=50
回国 = select, 自动回国, CN-Shanghai, CN-Guangzhou
兜底 = select, DIRECT, 回国

[Rule]
# 直连类
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/private.txt,DIRECT
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/direct.txt,DIRECT
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/apple.txt,DIRECT

# 中国大陆（回国）
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/china.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/china_company_ip.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/cncidr.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/apple-cn.txt,回国

# 流媒体/游戏
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/bilibili.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/neteasemusic.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/qqmusic.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/tencent.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/youku.txt,回国
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/iqiyi.txt,回国

# 广告拦截
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/reject.txt,REJECT

# FINAL
FINAL,兜底
